  <text x="760" y="714" font-size="10" fill="#e8e8f0" text-anchor="middle">Day 4: QVM → Laneways (Hosier Lane) → Fed Square → NGV · Free tram zone</text>
  <text x="760" y="730" font-size="10" fill="#e8e8f0" text-anchor="middle">Day 5: Fitzroy (Brunswick St coffee) → Tram 96 to St Kilda → Acland St bakeries</text>
