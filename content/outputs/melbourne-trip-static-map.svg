  <text x="770" y="376" font-size="10" fill="#6666aa" text-anchor="middle">Zoomed-in walking zone</text>

  <!-- GREAT OCEAN ROAD route -->
  <path d="M 640 380 Q 600 310 540 260 Q 480 210 420 190 Q 360 175 320 200 Q 290 220 265 270"
