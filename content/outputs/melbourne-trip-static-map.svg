  <!-- Background -->
  <rect width="1000" height="780" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="36" font-size="20" font-weight="800" fill="#e85d04" text-anchor="middle" letter-spacing="2">MELBOURNE TRIP MAP — JULY 1–10, 2025</text>
